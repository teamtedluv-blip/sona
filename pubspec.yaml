name: sona
description: Government Noise Monitoring Station Agent

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ✅ Audio (stable for macOS + Linux prototype)
  record: ^6.1.1
  flutter_audio_capture: ^1.1.8
  mic_stream: ^0.7.1

  # ✅ Networking
  http: ^1.2.2
  dio: ^5.9.0

  # ✅ State / utilities (safe core tools)
  provider: ^6.1.5
  uuid: ^4.5.1
  logger: ^2.6.1

  # ✅ Local storage (optional but useful for offline logging)
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  path: ^1.9.1

  # ✅ Charts (for future dashboard)
  fl_chart: ^1.1.1
  syncfusion_flutter_gauges: ^33.2.12

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - images/blink.png